<div class="sidebar">

    <h2 class="logo">HRMS</h2>

    <p class="role-text">
        Role: {{role}}
    </p>

    <ul>

        <!-- Dashboard -->
        <li routerLink="/dashboard" routerLinkActive="active-menu">

            <i class="pi pi-home"></i>
            Dashboard

        </li>

        <!-- ADMIN + HR -->
        <ng-container *ngIf="role === 'Admin' || role === 'HR'">

            <li routerLink="/employees" routerLinkActive="active-menu">

                <i class="pi pi-users"></i>
                Employees

            </li>

            <li routerLink="/salary" routerLinkActive="active-menu">

                <i class="pi pi-wallet"></i>
                Salary

            </li>

            <li routerLink="/payroll" routerLinkActive="active-menu">

                <i class="pi pi-money-bill"></i>
                Payroll

            </li>

            <li routerLink="/increment" routerLinkActive="active-menu">

                <i class="pi pi-chart-line"></i>
                Increment

            </li>

            <li routerLink="/promotion" routerLinkActive="active-menu">

                <i class="pi pi-star"></i>
                Promotion

            </li>

            <li routerLink="/leave" routerLinkActive="active-menu">

                <i class="pi pi-calendar"></i>
                Leave

            </li>

            <li routerLink="/attendance" routerLinkActive="active-menu">

                <i class="pi pi-clock"></i>
                Attendance

            </li>

        </ng-container>

        <!-- EMPLOYEE -->
        <ng-container *ngIf="role === 'Employee'">

            <li routerLink="/profile" routerLinkActive="active-menu">

                <i class="pi pi-user"></i>
                My Profile

            </li>

        </ng-container>

        <!-- ALL -->
        <li routerLink="/notifications" routerLinkActive="active-menu">

            <i class="pi pi-bell"></i>
            Notifications

        </li>

    </ul>

</div>
