<div class="card">

    <div class="table-header">

        <h2>Employees</h2>

        <button pButton label="Add Employee" class="p-button-success p-2" style="font-weight: 600; font-size: 1.2rem; border-radius: 5px;"></button>

    </div>

    <p-table [value]="employees" [tableStyle]="{'min-width':'60rem'}">

        <ng-template pTemplate="header">

            <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Department</th>
                <th>Position</th>
                <th>Salary</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>

        </ng-template>

        <ng-template pTemplate="body" let-employee>

            <tr>

                <td>
                    <img [src]="employee.image" width="40" height="40" class="mt-1" style="border-radius:50%" >
                </td>

                <td>{{employee.name}}</td>
                <td>{{employee.department}}</td>
                <td>{{employee.position}}</td>
                <td>{{employee.salary}}</td>

                <td>
                    <span class="status active">
                        {{employee.status}}
                    </span>
                </td>

                <td>

                    <button
                        pButton
                        icon="pi pi-eye"
                        style="font-size: 1.2rem;"
                        class="p-button-info m-2"
                        routerLink="/profile">
                    </button>

                    <button pButton icon="pi pi-pencil" class="p-button-warning m-2" style="font-size: 1.2rem;"></button>
                    <button pButton icon="pi pi-trash" class="p-button-danger m-2" style="font-size: 1.2rem;"></button>

                </td>

            </tr>

        </ng-template>

    </p-table>

</div>
